experiment_name: ae_baseline
output_dir: runs/ae_baseline
seed: 42
epochs: 180
batch_size: 24
grad_clip_norm: 1.0

dataset:
  root_dir: TongueDB
  image_subdir: images
  mesh_subdir: meshes
  num_points: 2048
  image_size: 224
  preload_meshes: true
  augment: true

split:
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0
  seed: 42

model:
  latent_dim: 256
  decoder_hidden_dim: 1024
  dropout: 0.1

optimizer:
  lr: 0.0002
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999

runtime:
  device: cuda
  amp: true
  num_workers: 8
  pin_memory: true

checkpoint:
  save_every: 10

loss:
  chamfer: 1.0
  normal: 0.1
  laplacian: 0.05
  edge: 0.02
