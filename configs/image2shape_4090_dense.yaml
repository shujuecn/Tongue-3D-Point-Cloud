experiment_name: img2shape_4090_dense
output_dir: runs/img2shape_4090_dense
seed: 42
epochs: 170
batch_size: 8
grad_accum_steps: 2
grad_clip_norm: 1.0
autoencoder_checkpoint: runs/ae_4090_dense/best.pt
freeze_decoder: false
decoder_lr_scale: 0.2
require_torchvision: true

dataset:
  root_dir: TongueDB
  image_subdir: images
  mesh_subdir: meshes
  num_points: 8192
  image_size: 224
  preload_meshes: true
  augment: true

split:
  train_ratio: 0.9
  val_ratio: 0.1
  test_ratio: 0.0
  seed: 42

model:
  latent_dim: 256
  decoder_hidden_dim: 1536
  dropout: 0.2

optimizer:
  lr: 0.00008
  weight_decay: 0.0001
  beta1: 0.9
  beta2: 0.999

runtime:
  device: cuda
  amp: true
  num_workers: 8
  pin_memory: true

checkpoint:
  save_every: 100

visualization:
  enabled: true
  every_n_epochs: 50
  num_samples: 2
  max_points: 4096
  save_ply: true

loss:
  chamfer: 1.2
  chamfer_chunk_size: 2048
  normal: 0.05
  laplacian: 0.05
  edge: 0.02
  latent: 1.5
